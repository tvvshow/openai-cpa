version: '3.8'

services:
  codex-web:
    image: pestxo/wenfxl-codex-manager:latest
    container_name: codex_manager
    ports:
      - "8000:8000"
    restart: always
    environment:
      - TZ=Asia/Shanghai
      - DB_TYPE=mysql
      - DB_HOST=你的云端MySQL地址
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASS=你的数据库密码
      - DB_NAME=codex_manager